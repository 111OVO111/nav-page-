<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日六爻运势</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #e8d5b7;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 600px; width: 100%; text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 10px; color: #f0c674; }
        .date { font-size: 1rem; color: #8b9dc3; margin-bottom: 30px; }
        .coins-container { display: flex; justify-content: center; gap: 20px; margin: 30px 0; min-height: 100px; }
        .coin {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(145deg, #d4af37, #aa8c2c);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; color: #1a1a2e;
            cursor: pointer; transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); user-select: none;
        }
        .coin:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.6); }
        .coin.tossing { animation: toss 0.5s ease-in-out; }
        @keyframes toss {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-30px) rotate(180deg); }
            50% { transform: translateY(-40px) rotate(360deg); }
            75% { transform: translateY(-20px) rotate(540deg); }
        }
        .result { margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .hexagram { font-size: 3rem; letter-spacing: 10px; margin: 20px 0; }
        .hexagram-name { font-size: 1.5rem; color: #f0c674; margin-bottom: 15px; }
        .yao-desc { font-size: 1rem; line-height: 1.8; color: #c9b896; text-align: left; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .btn { padding: 15px 40px; font-size: 1.2rem; background: linear-gradient(145deg, #d4af37, #aa8c2c); color: #1a1a2e; border: none; border-radius: 30px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(212,175,55,0.5); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress { margin: 20px 0; color: #8b9dc3; }
        .yao-dots { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .yao-dot { width: 12px; height: 12px; border-radius: 50%; background: #d4af37; opacity: 0.3; }
        .yao-dot.active { opacity: 1; box-shadow: 0 0 10px rgba(212,175,55,0.8); }
        .fortune-level { font-size: 1.3rem; margin: 15px 0; padding: 10px 20px; border-radius: 20px; display: inline-block; }
        .da-ji { background: linear-gradient(145deg, #4caf50, #2e7d32); }
        .xiao-ji { background: linear-gradient(145deg, #8bc34a, #558b2f); }
        .ping-deng { background: linear-gradient(145deg, #ff9800, #f57c00); }
        .xiong { background: linear-gradient(145deg, #f44336, #c62828); }
    </style>
</head>
<body>
    <div class="container">
        <h1>📜 今日六爻运势</h1>
        <div class="date" id="currentDate"></div>
        <div class="coins-container">
            <div class="coin" id="coin1">?</div>
            <div class="coin" id="coin2">?</div>
            <div class="coin" id="coin3">?</div>
        </div>
        <div class="yao-dots" id="yaoDots">
            <div class="yao-dot"></div><div class="yao-dot"></div><div class="yao-dot"></div>
            <div class="yao-dot"></div><div class="yao-dot"></div><div class="yao-dot"></div>
        </div>
        <div class="progress" id="progress">点击开始起卦</div>
        <button class="btn" id="startBtn" onclick="startDivination()">开始起卦</button>
        <div class="result" id="result" style="display:none;">
            <div class="hexagram-name" id="hexagramName"></div>
            <div class="hexagram" id="hexagram"></div>
            <div class="fortune-level" id="fortuneLevel"></div>
            <div class="yao-desc" id="yaoDesc"></div>
        </div>
    </div>
    <script>
        const hexagrams = {
            0: {name:"乾为天",s:"☰☰",d:"元亨利贞。象征天，象征纯粹的阳气和积极进取的精神。运势极强，万事皆宜。"},
            1: {name:"坤为地",s:"☷☷",d:"元亨，利牝马之贞。象征地，柔顺、包容。运势平稳，宜守成。"},
            10: {name:"天地泰",s:"☰☷",d:"小往大来，吉亨。象征通泰和顺利，运势上升期，万事大吉。"},
            11: {name:"天地否",s:"☷☰",d:"否之匪人，不利君子贞，大往小来。象征阻塞，运势低迷，宜静待转机。"},
            14: {name:"地山谦",s:"☷☶",d:"亨，君子有终。象征谦虚，运势平稳，谦虚则吉。"},
            15: {name:"雷地豫",s:"☳☷",d:"利建侯行师。象征欢乐和预备，运势宜积极行动。"},
            16: {name:"泽雷随",s:"☱☳",d:"元亨利贞，无咎。象征随从和跟随，运势宜顺势而为。"},
            24: {name:"地雷复",s:"☷☳",d:"亨，出入无疾，朋来无咎。象征复归和新生，运势开始好转。"},
            33: {name:"天山遁",s:"☰☶",d:"亨，小利贞。象征退避和隐退，运势宜退不宜进。"},
            34: {name:"雷天大壮",s:"☳☰",d:"利贞。象征强盛和壮大，运势强进。"},
            35: {name:"火地晋",s:"☲☷",d:"康侯用锡马蕃庶。象征晋升和进益，运势上升。"},
            36: {name:"地火明夷",s:"☷☲",d:"利艰贞。象征光明受损，运势有阻，宜隐忍。"},
            37: {name:"风火家人",s:"☴☲",d:"利女贞。象征家庭，运势宜注重家庭。"},
            38: {name:"火泽睽",s:"☲☱",d:"小事吉。象征乖离和不同，运势有分歧。"},
            39: {name:"水山蹇",s:"☵☶",d:"利西南，不利东北，利见大人。象征困难和阻碍，运势遇阻。"},
            40: {name:"雷水解",s:"☳☵",d:"利西南，无所往，其来复吉。象征解除和缓解，运势转好。"},
            45: {name:"泽地萃",s:"☱☷",d:"亨，利见大人，亨利贞。象征聚集，运势宜团结。"},
            46: {name:"地风升",s:"☷☴",d:"元亨，用见大人。象征上升，运势向上。"},
            47: {name:"泽水困",s:"☱☵",d:"亨，贞大人吉，无咎。象征困顿，运势艰难。"},
            48: {name:"水风井",s:"☵☴",d:"改邑不改井，无丧无得。象征稳定和供给。"},
            49: {name:"泽火革",s:"☱☲",d:"己日乃孚，元亨利贞，悔亡。象征变革，运势转变。"},
            50: {name:"火风鼎",s:"☲☴",d:"元吉，亨。象征鼎新和稳定，运势革新大吉。"},
            51: {name:"震为雷",s:"☳☳",d:"亨，震来虩虩。象征震动和惊恐，运势有波动。"},
            52: {name:"艮为山",s:"☶☶",d:"艮其背，不获其身。象征静止和止步。"},
            53: {name:"风山渐",s:"☴☶",d:"女归吉，利贞。象征渐进和稳步发展。"},
            54: {name:"雷泽归妹",s:"☳☱",d:"征凶，无攸利。象征回归和嫁娶，运势有阻碍。"},
            55: {name:"雷火丰",s:"☳☲",d:"亨，王假之，勿忧，宜日中。象征丰盛和盛大，运势鼎盛。"},
            56: {name:"火山旅",s:"☲☶",d:"小亨，旅贞吉。象征旅行和漂泊，运势需谨慎。"},
            57: {name:"巽为风",s:"☴☴",d:"小亨，利有攸往，利见大人。象征顺从和渗透。"},
            58: {name:"兑为泽",s:"☱☱",d:"亨，利贞。象征喜悦和泽润，运势和乐。"},
            59: {name:"风水涣",s:"☴☵",d:"亨，王假有庙，利涉大川。象征涣散和化解，运势通达。"},
            60: {name:"水泽节",s:"☵☱",d:"亨，苦节不可贞。象征节制和限制，运势需节制。"},
            61: {name:"风泽中孚",s:"☴☱",d:"豚鱼吉，利涉大川，利贞。象征诚信和中孚，运势吉利。"},
            62: {name:"雷山小过",s:"☳☶",d:"亨利贞，可小事，不可大事。象征小有过失，运势需谨慎。"},
            63: {name:"水火既济",s:"☵☲",d:"亨小利贞，初吉终乱。象征成功和完成，运势需防盛极必衰。"},
            64: {name:"火水未济",s:"☲☵",d:"亨，小狐汔济，濡其尾，无攸利。象征未完成，运势需继续努力。"}
        };
        
        let currentYao = 0;
        let yaos = [];
        
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});
        
        function tossCoins() {
            return [Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1, Math.floor(Math.random()*2)+1].reduce((a,b)=>a+b, 2);
        }
        
        function getYaoValue(sum) {
            if (sum === 6) return {v:8,b:'--'};
            if (sum === 7) return {v:9,b:'--'};
            if (sum === 8) return {v:6,b:'- -'};
            if (sum === 9) return {v:7,b:'-'};
            return {v:6,b:'- -'};
        }
        
        function toss() {
            const coins = [document.getElementById('coin1'),document.getElementById('coin2'),document.getElementById('coin3')];
            coins.forEach(c => c.classList.add('tossing'));
            setTimeout(() => {
                coins.forEach(c => c.classList.remove('tossing'));
                const sum = tossCoins();
                coins.forEach((c,i) => {
                    c.textContent = ['背','正'][Math.floor(Math.random()*2)];
                });
                const yao = getYaoValue(sum);
                yaos.push(yao);
                document.getElementById('progress').textContent = `第 ${currentYao+1} 爻`;
                document.querySelectorAll('.yao-dot')[currentYao].classList.add('active');
                currentYao++;
                if (currentYao < 6) {
                    setTimeout(toss, 800);
                } else {
                    showResult();
                }
            }, 500);
        }
        
        function showResult() {
            let hex = 0;
            yaos.forEach((y, i) => { hex += y.v * Math.pow(2, i); });
            const h = hexagrams[hex] || hexagrams[Math.floor(Math.random()*64)];
            const level = hex > 32 ? '大吉' : hex > 16 ? '中吉' : hex > 8 ? '小吉' : '凶';
            const levelClass = level === '大吉' ? 'da-ji' : level === '中吉' ? 'xiao-ji' : level === '小吉' ? 'ping-deng' : 'xiong';
            document.getElementById('result').style.display = 'block';
            document.getElementById('hexagramName').textContent = h.name;
            document.getElementById('hexagram').textContent = h.s;
            document.getElementById('fortuneLevel').textContent = level;
            document.getElementById('fortuneLevel').className = 'fortune-level ' + levelClass;
            document.getElementById('yaoDesc').textContent = h.d;
            document.getElementById('startBtn').textContent = '再算一次';
            document.getElementById('startBtn').onclick = () => location.reload();
        }
        
        function startDivination() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').textContent = '起卦中...';
            toss();
        }
    </script>
</body>
</html>
