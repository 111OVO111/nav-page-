<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花花的导航页</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e2b3cf 0%, #7d7eb2 100%);
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .profile { text-align: center; margin-bottom: 30px; }
        .avatar {
            width: 120px; height: 120px; margin: 0 auto 15px;
            border-radius: 50%; border: 4px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 32px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); margin-bottom: 8px; }
        .desc { color: rgba(255,255,255,0.9); font-size: 16px; }
        .search { margin-bottom: 30px; }
        .search input {
            width: 100%; padding: 15px 25px; font-size: 16px;
            border: none; border-radius: 50px;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            outline: none;
        }
        .links { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card {
            background: rgba(255,255,255,0.95); border-radius: 16px;
            padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-title { font-size: 18px; color: #7d7eb2; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e2b3cf; }
        .link-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .link-item {
            display: inline-block; padding: 8px 16px;
            background: linear-gradient(135deg, #e2b3cf 0%, #7d7eb2 100%);
            color: #fff; text-decoration: none; border-radius: 20px; font-size: 14px;
        }
        .link-item:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(125,126,178,0.4); }
        .footer { text-align: center; color: rgba(255,255,255,0.8); font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile">
            <div class="avatar">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Huahua&backgroundColor=e2b3cf" alt="花花">
            </div>
            <h1 class="name">花花</h1>
            <p class="desc">欢迎来到我的小窝~ 🐍</p>
        </div>
        
        <div class="search">
            <form action="https://www.baidu.com/s" method="get" target="_blank">
                <input type="text" name="wd" placeholder="百度搜索...">
            </form>
        </div>
        
        <div class="links">
            <div class="card">
                <h2 class="card-title">📺 视频</h2>
                <div class="link-list">
                    <a class="link-item" href="https://www.bilibili.com" target="_blank">B站</a>
                    <a class="link-item" href="https://www.douyin.com" target="_blank">抖音</a>
                    <a class="link-item" href="https://v.qq.com" target="_blank">腾讯视频</a>
                    <a class="link-item" href="https://www.iqiyi.com" target="_blank">爱奇艺</a>
                    <a class="link-item" href="https://www.youku.com" target="_blank">优酷</a>
                    <a class="link-item" href="https://www.youtube.com" target="_blank">YouTube</a>
                </div>
            </div>
            
            <div class="card">
                <h2 class="card-title">📚 小说</h2>
                <div class="link-list">
                    <a class="link-item" href="https://www.qidian.com" target="_blank">起点中文网</a>
                    <a class="link-item" href="https://fanqienovel.com" target="_blank">番茄小说</a>
                    <a class="link-item" href="https://www.qimao.com" target="_blank">七猫小说</a>
                    <a class="link-item" href="https://www.jjwxc.net" target="_blank">晋江文学城</a>
                </div>
            </div>
            
            <div class="card">
                <h2 class="card-title">🛠️ 工具</h2>
                <div class="link-list">
                    <a class="link-item" href="https://www.baidu.com" target="_blank">百度</a>
                    <a class="link-item" href="https://www.google.com" target="_blank">Google</a>
                    <a class="link-item" href="https://github.com" target="_blank">GitHub</a>
                    <a class="link-item" href="https://gitee.com" target="_blank">Gitee</a>
                </div>
            </div>
        </div>
        
        <footer class="footer">
            <p>© 2026 花花的小窝</p>
        </footer>
    </div>
</body>
</html>
